aid: hawaiian-electric-industries
name: Hawaiian Electric Industries
description: >-
  Hawaiian Electric Industries (HEI) is a Hawaii-based holding company whose
  primary subsidiaries provide electric utility service to roughly 95% of
  Hawaii's residents through Hawaiian Electric, and clean-energy investments
  through Pacific Current. HEI does not publish public developer APIs at this
  time; this index tracks the company and its subsidiaries for API discovery
  purposes.
